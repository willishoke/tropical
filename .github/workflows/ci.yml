name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (C++ core, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ libasound2-dev

      - name: Configure
        run: cmake -S . -B build -DEGRESS_BUILD_PYTHON=OFF -DEGRESS_LLVM_ORC_JIT=OFF

      - name: Build
        run: cmake --build build --parallel

  pytest:
    name: pytest (Python 3.13, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libasound2-dev

      - name: Install build tools
        run: pip install --upgrade pip build "scikit-build-core>=0.9" cmake ninja

      - name: Build wheel
        env:
          CMAKE_ARGS: "-DEGRESS_LLVM_ORC_JIT=OFF -DEGRESS_LLVM_STATIC=OFF"
        run: python -m build --no-isolation --wheel

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Run pytest
        run: pytest test/
