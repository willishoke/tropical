name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install yamllint
        run: pip install yamllint
      - name: Find and lint YAML files
        run: |
          files=$(find . \
            -name "*.yaml" -o -name "*.yml" \
            | grep -v "^\./build" \
            | grep -v "^\./lib/" \
            | grep -v "^\./\.venv/" \
            | grep -v "^\./\.claude/" \
            | sort)
          if [ -z "$files" ]; then
            echo "No YAML files found — skipping"
          else
            echo "$files" | xargs yamllint
          fi
