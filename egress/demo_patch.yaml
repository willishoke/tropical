schema_version: mcp_patch_1

# Starter patch: VCO oscillator → Reverb → graph output
# Load this with: load_patch <yaml_str>

modules:
  - name: osc1
    library_type: vco
  - name: rev1
    library_type: reverb

connections:
  - src: osc1
    src_output: sin
    dst: rev1
    dst_input: input

outputs:
  - module: rev1
    output: output
